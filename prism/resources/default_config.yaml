# Prism config — edit freely. The command you run stays `prism`.
#
# Swap providers by editing this file only (never any code). `providers.<name>.type`
# is a litellm provider slug (openrouter, zai, openai, gemini, anthropic, …) and is
# what decides which backend a route calls. Model ids are provider-native:
#   - OpenRouter carries a vendor segment:  z-ai/glm-5.2 , google/gemini-2.5-flash
#   - Direct providers use bare ids:        glm-5.2 (zai) , gpt-4o-mini (openai)
#
# Routing: text/coding -> `coder`; images & files -> `multimodal`; cheap background
# tasks -> `background`. Only requests that carry an image/file pay multimodal rates.

schema_version: 1

providers:
  openrouter:
    type: openrouter
    api_key_env: OPENROUTER_API_KEY
    # api_base: https://openrouter.ai/api/v1   # (optional override; native default is fine)

routes:
  coder:
    provider: openrouter
    model: z-ai/glm-5.2
    # OpenRouter serves one model id from several upstream providers and load-balances
    # on price/uptime by default. Claude Code leans hard on tool calls and consistent
    # quality, so pin the coder route: `require_parameters` keeps it on providers that
    # honor the tools/params we send, and `quantizations` restricts to FP8-or-better
    # (excludes int4/int8/fp4/fp6 and undeclared `unknown`). See OpenRouter provider
    # routing docs. Any keys under `extra_body` pass through to the backend verbatim.
    extra_body:
      provider:
        require_parameters: true
        quantizations: [fp8, fp16, bf16, fp32]
  background:
    provider: openrouter
    model: z-ai/glm-4.7-flash
    extra_body:
      provider:
        quantizations: [fp8, fp16, bf16, fp32]   # same FP8-or-better quality floor as coder
  multimodal:
    provider: openrouter
    model: google/gemini-2.5-flash

# Which Claude Code tier maps to which route.
mapping:
  opus: coder
  sonnet: coder
  haiku: background

# ── Example: swap the coder to GLM direct from z.ai (no code change) ──────────────
# providers:
#   zai:
#     type: zai                 # native litellm provider: auto base + reads the key env
#     api_key_env: ZAI_API_KEY
# routes:
#   coder:   { provider: zai, model: glm-5.2 }
#
# ── Example: multimodal via Gemini direct (Google AI Studio) ─────────────────────
# providers:
#   gemini:
#     type: gemini
#     api_key_env: GEMINI_API_KEY
# routes:
#   multimodal: { provider: gemini, model: gemini-2.5-flash }
